<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a" />
  
  <!-- Simplified Go board grid (4x4) -->
  <g stroke="#334155" stroke-width="8" stroke-linecap="round">
    <line x1="64" y1="64" x2="448" y2="64" />
    <line x1="64" y1="192" x2="448" y2="192" />
    <line x1="64" y1="320" x2="448" y2="320" />
    <line x1="64" y1="448" x2="448" y2="448" />
    <line x1="64" y1="64" x2="64" y2="448" />
    <line x1="192" y1="64" x2="192" y2="448" />
    <line x1="320" y1="64" x2="320" y2="448" />
    <line x1="448" y1="64" x2="448" y2="448" />
  </g>
  
  <!-- Center star point (Go board intersection) -->
  <circle cx="256" cy="256" r="8" fill="#38bdf8" />
  
  <!-- Magnifying glass handle -->
  <line x1="355" y1="355" x2="460" y2="460" stroke="#38bdf8" stroke-width="16" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Magnifying glass lens -->
  <circle cx="256" cy="256" r="140" fill="#38bdf8" opacity="0.1" stroke="#38bdf8" stroke-width="12" filter="url(#glow)" />
  
  <!-- Audit checkmark inside the lens -->
  <path d="M190 260 L235 305 L320 205" fill="none" stroke="#38bdf8" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
